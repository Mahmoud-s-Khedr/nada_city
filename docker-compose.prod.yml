services:
  migrate:
    build: .
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT must be set}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET must be set}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?S3_PUBLIC_BASE_URL must be set}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY must be set}
      FROM_EMAIL: ${FROM_EMAIL:?FROM_EMAIL must be set}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT must be set}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID must be set}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY must be set}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET must be set}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?S3_PUBLIC_BASE_URL must be set}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY must be set}
      FROM_EMAIL: ${FROM_EMAIL:?FROM_EMAIL must be set}
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    init: true
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "127.0.0.1:${COMPOSE_NGINX_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/compose-prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redisdata:
